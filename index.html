<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>স্মার্ট সিট ও রেজাল্ট ফাইন্ডার</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Noto Sans Bengali', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            900: '#312e81',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { 
            -webkit-tap-highlight-color: transparent;
            background-color: #f8fafc; /* slate-50 */
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 24px 24px;
        }
        
        /* Smooth Animations */
        .slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Refined Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Custom Grid Card Selection */
        .exam-card {
            transition: all 0.2s ease;
        }
        .exam-card.selected {
            border-color: #4f46e5;
            background-color: #f8fafc;
            box-shadow: 0 0 0 1px #4f46e5;
        }
        .exam-card.selected .check-circle {
            background-color: #4f46e5;
            border-color: #4f46e5;
            color: white;
        }
        
        /* Shimmering Skeleton Loader */
        .skeleton {
            background: #e2e8f0;
            background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 sm:p-6 lg:p-8">

    <div class="w-full max-w-[34rem] bg-white rounded-[24px] shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-200/60 overflow-hidden relative">
        
        <!-- Subtle Top Accent Line -->
        <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-brand-500 to-blue-500"></div>

        <!-- Clean Header -->
        <div class="pt-10 pb-6 px-8 text-center border-b border-slate-100">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-brand-50 rounded-2xl mb-5 shadow-sm border border-brand-100/50">
                <svg class="w-7 h-7 text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-900 tracking-tight mb-1.5">স্মার্ট সিট ফাইন্ডার</h1>
            <p class="text-slate-500 text-sm font-medium">আপনার কাঙ্ক্ষিত পরীক্ষা নির্বাচন করে সিট বা রেজাল্ট দেখুন</p>
        </div>

        <!-- Main Form Area -->
        <div class="p-6 sm:p-8 bg-white relative z-10">
            
            <input type="hidden" id="selectedExamUrl" value="">

            <form id="searchForm" class="space-y-7">
                
                <!-- Exam Grid Section -->
                <div>
                    <div class="flex justify-between items-center mb-3">
                        <label class="block text-sm font-semibold text-slate-800">পরীক্ষা নির্বাচন করুন</label>
                        <span id="examCountBadge" class="text-[11px] font-bold text-brand-700 bg-brand-50 px-2.5 py-1 rounded-full hidden border border-brand-100">০ টি পাওয়া গেছে</span>
                    </div>
                    
                    <div id="examGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-[240px] overflow-y-auto pr-1 pb-1 -mr-1">
                        <!-- Skeleton Loaders -->
                        <div class="skeleton h-[76px] rounded-xl"></div>
                        <div class="skeleton h-[76px] rounded-xl"></div>
                        <div class="skeleton h-[76px] rounded-xl hidden sm:block"></div>
                        <div class="skeleton h-[76px] rounded-xl hidden sm:block"></div>
                    </div>
                    <p id="gridErrorText" class="text-sm text-red-500 mt-3 hidden font-medium flex items-center">
                        <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <span></span>
                    </p>
                </div>

                <!-- Input Section -->
                <div>
                    <label for="rollNumber" class="block text-sm font-semibold text-slate-800 mb-2">আপনার রোল নম্বর</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="h-5 w-5 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V8a2 2 0 00-2-2h-5m-4 0V5a2 2 0 114 0v1m-4 0a2 2 0 104 0m-5 8a2 2 0 100-4 2 2 0 000 4zm0 0c1.306 0 2.417.835 2.83 2M9 14a3.001 3.001 0 00-2.83 2M15 11h3m-3 4h2" />
                            </svg>
                        </div>
                        <input type="number" id="rollNumber" placeholder="যেমন: 613000" required
                            class="block w-full pl-11 pr-4 py-3.5 border border-slate-200 rounded-xl bg-slate-50/50 hover:bg-slate-50 focus:bg-white focus:outline-none focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 sm:text-sm transition-all text-slate-900 font-medium placeholder-slate-400" />
                    </div>
                </div>

                <!-- Action Button -->
                <button type="submit" id="submitBtn" class="w-full flex justify-center items-center py-4 px-4 border border-transparent rounded-xl text-base font-semibold text-white bg-slate-900 hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-900 transition-all shadow-sm disabled:opacity-70 disabled:cursor-not-allowed">
                    <span id="btnText">তথ্য খুঁজুন</span>
                    <svg id="btnSpinner" class="hidden animate-spin ml-3 h-5 w-5 text-white/70" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </button>
            </form>

            <!-- Error Message Alert -->
            <div id="errorBox" class="hidden mt-5 p-4 bg-red-50 border border-red-100 rounded-xl text-red-600 text-sm flex items-start">
                <svg class="w-5 h-5 mr-3 flex-shrink-0 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                <span id="errorMessage" class="font-medium leading-relaxed pt-0.5"></span>
            </div>
        </div>

        <!-- Results Container -->
        <div id="resultContainer" class="hidden border-t border-slate-100 bg-slate-50 p-6 sm:p-8">
            
            <!-- Result State (Pass/Fail) -->
            <div id="passResultContainer" class="hidden text-center slide-up">
                <div class="inline-flex items-center justify-center w-16 h-16 bg-green-100 rounded-full mb-4">
                    <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>
                </div>
                <h3 class="text-xl font-bold text-slate-900 mb-1">অভিনন্দন!</h3>
                <p class="text-slate-500 text-sm font-medium mb-4">আপনার রোল নম্বরটি ফলাফলের তালিকায় পাওয়া গেছে।</p>
                <div class="inline-flex items-center justify-center bg-white border border-slate-200 py-2 px-5 rounded-lg shadow-sm">
                    <span class="text-slate-500 text-sm mr-2">রোল:</span>
                    <span id="passRollText" class="text-slate-900 font-bold text-lg tracking-wide"></span>
                </div>
            </div>

            <!-- Seat Plan State -->
            <div id="seatPlanContainer" class="hidden slide-up">
                <h3 class="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-4">আপনার পরীক্ষার কেন্দ্র</h3>
                
                <div class="space-y-3">
                    <!-- Center Details -->
                    <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm">
                        <div class="flex items-start gap-4">
                            <div class="bg-brand-50 p-2.5 rounded-lg text-brand-600 shrink-0">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                            </div>
                            <div>
                                <h4 id="resName" class="font-bold text-slate-900 text-[15px] leading-snug"></h4>
                                <p id="resAddress" class="text-slate-500 text-sm mt-1"></p>
                            </div>
                        </div>
                    </div>

                    <!-- Bus Route -->
                    <div id="busInfoCard" class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm hidden">
                        <div class="flex items-start gap-4">
                            <div class="bg-blue-50 p-2.5 rounded-lg text-blue-600 shrink-0">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                            </div>
                            <div class="w-full">
                                <h4 class="font-semibold text-slate-900 text-sm mb-2.5">যাতায়াতের রুট</h4>
                                <div class="space-y-2 text-sm">
                                    <div class="flex justify-between border-b border-slate-100 pb-2">
                                        <span class="text-slate-500">বাসের নাম</span> 
                                        <span id="resBusNames" class="text-slate-900 font-medium text-right max-w-[60%]"></span>
                                    </div>
                                    <div class="flex justify-between pt-1">
                                        <span class="text-slate-500">নামার স্থান</span> 
                                        <span id="resBusStand" class="text-slate-900 font-medium text-right max-w-[60%]"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Traffic Alert -->
                    <div id="trafficCard" class="bg-orange-50/50 p-5 rounded-xl border border-orange-100/80 hidden">
                        <div class="flex items-start gap-4">
                            <div class="bg-orange-100 text-orange-600 p-2.5 rounded-lg shrink-0">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                            </div>
                            <div>
                                <h4 class="font-semibold text-orange-900 text-sm mb-1">ট্রাফিক আপডেট</h4>
                                <p id="resTraffic" class="text-orange-800/90 text-sm leading-relaxed"></p>
                            </div>
                        </div>
                    </div>

                    <!-- Hotels List -->
                    <div id="hotelCard" class="hidden bg-white rounded-xl border border-slate-200 overflow-hidden shadow-sm">
                        <div class="bg-slate-50 px-5 py-3.5 border-b border-slate-200 flex items-center">
                            <svg class="w-4 h-4 text-slate-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                            <h4 class="font-semibold text-slate-700 text-sm">কাছাকাছি সাশ্রয়ী হোটেল</h4>
                        </div>
                        <div id="hotelList" class="divide-y divide-slate-100">
                            <!-- Hotel Items Inject Here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // Google Script API URL
        const GOOGLE_SHEET_API = 'https://script.google.com/macros/s/AKfycbxi7pNJPsjqwT-FO5TEac0PnAPGPiYYZLxHvjhGoz5Eueca3U4wpRBNtRmDxX6nZD1x/exec';

        // DOM Elements
        const examGrid = document.getElementById('examGrid');
        const selectedExamUrlInput = document.getElementById('selectedExamUrl');
        const gridErrorText = document.getElementById('gridErrorText');
        const examCountBadge = document.getElementById('examCountBadge');
        
        const form = document.getElementById('searchForm');
        const rollInput = document.getElementById('rollNumber');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        
        const resultContainer = document.getElementById('resultContainer');
        const errorBox = document.getElementById('errorBox');
        const errorMessage = document.getElementById('errorMessage');

        const passResultContainer = document.getElementById('passResultContainer');
        const passRollText = document.getElementById('passRollText');

        const seatPlanContainer = document.getElementById('seatPlanContainer');
        const resName = document.getElementById('resName');
        const resAddress = document.getElementById('resAddress');
        const busInfoCard = document.getElementById('busInfoCard');
        const resBusNames = document.getElementById('resBusNames');
        const resBusStand = document.getElementById('resBusStand');
        const trafficCard = document.getElementById('trafficCard');
        const resTraffic = document.getElementById('resTraffic');
        const hotelCard = document.getElementById('hotelCard');
        const hotelList = document.getElementById('hotelList');

        async function fetchWithTimeoutAndRetry(url, retries = 2, backoff = 1000, timeoutDuration = 6000, fetchOptions = {}) {
            for (let i = 0; i < retries; i++) {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), timeoutDuration);

                try {
                    const options = { ...fetchOptions, signal: controller.signal };
                    const response = await fetch(url, options);
                    clearTimeout(timeoutId); 
                    
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                    
                    const textData = await response.text();
                    
                    if (textData.trim().startsWith('<') && textData.toLowerCase().includes('html')) {
                        throw new Error("GOOGLE_SCRIPT_AUTH_ERROR");
                    }
                    
                    try {
                        const parsedData = JSON.parse(textData);
                        if (parsedData && parsedData.error) {
                            throw new Error(`SHEET_ERROR: ${parsedData.error}`);
                        }
                        return parsedData;
                    } catch (parseError) {
                        if (parseError.message.includes('SHEET_ERROR')) throw parseError;
                        throw new Error("Invalid JSON Data Received");
                    }
                } catch (err) {
                    clearTimeout(timeoutId);
                    if (i === retries - 1) throw err;
                    await new Promise(resolve => setTimeout(resolve, backoff));
                }
            }
        }

        async function initApp() {
            try {
                let data;
                try {
                    data = await fetchWithTimeoutAndRetry(GOOGLE_SHEET_API, 1, 1000, 8000, { redirect: "follow" });
                } catch (directError) {
                    const proxyApiUrl = 'https://migration-worker.contacttomizanur.workers.dev/?url=' + encodeURIComponent(GOOGLE_SHEET_API);
                    data = await fetchWithTimeoutAndRetry(proxyApiUrl, 2, 1000, 8000, { redirect: "follow" });
                }

                examGrid.innerHTML = ''; 
                gridErrorText.classList.add('hidden');
                
                if (!data || data.length === 0) {
                    gridErrorText.querySelector('span').textContent = 'কোনো পরীক্ষা পাওয়া যায়নি।';
                    gridErrorText.classList.remove('hidden');
                    return;
                }

                let validExamCount = 0;

                data.forEach((exam, index) => {
                    const title = exam.title || exam[0];
                    const url = exam.url || exam.jsonUrl || exam[1]; 

                    if (title && url && url.includes('http')) {
                        validExamCount++;
                        
                        const card = document.createElement('div');
                        card.className = 'exam-card relative bg-white border border-slate-200 rounded-xl p-4 flex items-center justify-between cursor-pointer hover:border-slate-300 hover:shadow-sm';
                        
                        // Auto-select first
                        if (index === 0) {
                            card.classList.add('selected');
                            selectedExamUrlInput.value = url;
                        }
                        
                        card.onclick = () => selectExam(card, url);

                        card.innerHTML = `
                            <div class="pr-6">
                                <h3 class="text-sm font-semibold text-slate-800 leading-snug">${title}</h3>
                            </div>
                            <div class="check-circle absolute right-4 w-5 h-5 rounded-full border-2 border-slate-300 flex items-center justify-center transition-colors">
                                <svg class="w-3 h-3 text-current opacity-0 transition-opacity" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"></path></svg>
                            </div>
                        `;
                        // CSS to show checkmark when selected
                        const style = document.createElement('style');
                        style.textContent = `.exam-card.selected .check-circle svg { opacity: 1; }`;
                        document.head.appendChild(style);

                        examGrid.appendChild(card);
                    }
                });
                
                if(validExamCount > 0){
                    const bnCount = validExamCount.toString().replace(/\d/g, d => '০১২৩৪৫৬৭৮৯'[d]);
                    examCountBadge.textContent = `${bnCount} টি পাওয়া গেছে`;
                    examCountBadge.classList.remove('hidden');
                    examCountBadge.classList.add('fade-in');
                } else {
                    gridErrorText.querySelector('span').textContent = 'কোনো সঠিক লিংক পাওয়া যায়নি।';
                    gridErrorText.classList.remove('hidden');
                }

            } catch (error) {
                console.error("Fetch API error:", error);
                examGrid.innerHTML = '';
                gridErrorText.classList.remove('hidden');
                
                if (error.message === "GOOGLE_SCRIPT_AUTH_ERROR") {
                    gridErrorText.querySelector('span').textContent = "পারমিশন এরর: স্ক্রিপ্টটি 'Anyone' এ সেট করুন।";
                } else if (error.message.includes("SHEET_ERROR")) {
                    gridErrorText.querySelector('span').textContent = `শিট এরর: ${error.message.replace('SHEET_ERROR: ', '')}`;
                } else {
                    gridErrorText.querySelector('span').textContent = "তালিকা লোড করা যাচ্ছে না। রিফ্রেশ করুন।";
                }
            }
        }

        function selectExam(selectedCard, url) {
            const allCards = document.querySelectorAll('.exam-card');
            allCards.forEach(card => card.classList.remove('selected'));
            selectedCard.classList.add('selected');
            selectedExamUrlInput.value = url;
        }

        function setLoading(isLoading) {
            submitBtn.disabled = isLoading;
            if (isLoading) {
                btnText.textContent = 'খোঁজা হচ্ছে...';
                btnSpinner.classList.remove('hidden');
                resultContainer.classList.add('hidden');
                errorBox.classList.add('hidden');
            } else {
                btnText.textContent = 'তথ্য খুঁজুন';
                btnSpinner.classList.add('hidden');
            }
        }

        function showError(msg) {
            errorMessage.textContent = msg;
            errorBox.classList.remove('hidden');
            errorBox.classList.add('slide-up');
        }

        function displayPassResult(roll) {
            seatPlanContainer.classList.add('hidden');
            passResultContainer.classList.remove('hidden');
            passRollText.textContent = roll;
            
            resultContainer.classList.remove('hidden');
            resultContainer.classList.add('slide-up');
        }

        function displaySeatPlan(center) {
            passResultContainer.classList.add('hidden');
            seatPlanContainer.classList.remove('hidden');

            resName.textContent = center.name || center.Name || center.center_name || 'নাম দেওয়া নেই';
            resAddress.textContent = center.address || center.Address || center.center_address || 'ঠিকানা দেওয়া নেই';
            
            const mentorGuide = center.mentor_guide || center.Mentor_Guide || center.guide;
            if (mentorGuide && (mentorGuide.bus_names || mentorGuide.bus_stand)) {
                busInfoCard.classList.remove('hidden');
                resBusNames.textContent = mentorGuide.bus_names || mentorGuide.Bus_Names || mentorGuide.bus || 'তথ্য নেই';
                resBusStand.textContent = mentorGuide.bus_stand || mentorGuide.Bus_Stand || mentorGuide.stand || 'তথ্য নেই';
            } else {
                busInfoCard.classList.add('hidden');
            }
            
            const trafficInfo = center.traffic_info || center.Traffic_Info || center.traffic;
            if (trafficInfo) {
                trafficCard.classList.remove('hidden');
                resTraffic.textContent = trafficInfo;
            } else {
                trafficCard.classList.add('hidden');
            }

            const hotels = center.affordable_hotels || center.hotels || center.affordableHotels;
            if (hotels && Array.isArray(hotels) && hotels.length > 0) {
                hotelCard.classList.remove('hidden');
                hotelList.innerHTML = ''; 
                hotels.forEach(hotel => {
                    const priceBadge = hotel.price ? `<span class="text-slate-600 font-semibold">${hotel.price}</span>` : '';
                    const genderBadge = hotel.gender ? `<span class="bg-slate-100 text-slate-500 text-[10px] uppercase font-bold px-2 py-0.5 rounded ml-2">${hotel.gender}</span>` : '';
                    
                    hotelList.innerHTML += `
                        <div class="p-4 hover:bg-slate-50/50 transition-colors">
                            <div class="flex justify-between items-start mb-1">
                                <h5 class="font-bold text-slate-800 text-sm">${hotel.name || 'নাম নেই'} ${genderBadge}</h5>
                                ${priceBadge}
                            </div>
                            <p class="text-xs text-slate-500">${hotel.location || 'ঠিকানা নেই'}</p>
                        </div>
                    `;
                });
            } else {
                hotelCard.classList.add('hidden');
            }

            resultContainer.classList.remove('hidden');
            resultContainer.classList.add('slide-up');
        }

        async function handleSearch(e) {
            e.preventDefault();
            const rollInputVal = rollInput.value.trim();
            const roll = parseInt(rollInputVal, 10);
            const jsonUrl = selectedExamUrlInput.value; 

            if (!jsonUrl) {
                showError("অনুগ্রহ করে উপরের তালিকা থেকে একটি পরীক্ষা নির্বাচন করুন।");
                return;
            }
            if (isNaN(roll)) {
                showError("অনুগ্রহ করে একটি সঠিক সংখ্যার রোল নম্বর প্রদান করুন।");
                return;
            }

            setLoading(true);

            try {
                const proxyUrl = 'https://migration-worker.contacttomizanur.workers.dev/?url=' + encodeURIComponent(jsonUrl);
                const data = await fetchWithTimeoutAndRetry(proxyUrl, 3, 1000, 8000, { redirect: "follow" });
                
                let parseData = data;
                
                if (parseData && typeof parseData === 'object' && !Array.isArray(parseData)) {
                    const nestedArray = Object.values(parseData).find(val => Array.isArray(val));
                    if (nestedArray) {
                        parseData = nestedArray;
                    }
                }

                setLoading(false);

                if (Array.isArray(parseData) && (typeof parseData[0] === 'string' || typeof parseData[0] === 'number')) {
                    const isPassed = parseData.some(item => item.toString() === rollInputVal);
                    if (isPassed) {
                        displayPassResult(rollInputVal);
                    } else {
                        showError(`দুঃখিত, আপনার রোল নম্বর (${rollInputVal}) ফলাফলের তালিকায় পাওয়া যায়নি।`);
                    }
                    return;
                }

                if (Array.isArray(parseData) && typeof parseData[0] === 'object') {
                    const foundCenter = parseData.find(center => {
                        const startStr = center.start_roll || center.Start_Roll || center.startRoll || center.start || center.Start;
                        const endStr = center.end_roll || center.End_Roll || center.endRoll || center.end || center.End;
                        
                        if (!startStr || !endStr) return false;

                        const start = parseInt(startStr.toString().replace(/,/g, '').trim(), 10);
                        const end = parseInt(endStr.toString().replace(/,/g, '').trim(), 10);
                        
                        return roll >= start && roll <= end;
                    });

                    if (foundCenter) {
                        displaySeatPlan(foundCenter);
                    } else {
                        showError(`আপনার রোল নম্বর ${roll} এর জন্য কোনো কেন্দ্র পাওয়া যায়নি।`);
                    }
                    return;
                }

                showError("ডেটার ফরমেট সঠিক নয়।");

            } catch (error) {
                console.error("Data Load Error:", error);
                setLoading(false);
                
                if(error.name === 'AbortError' || error.message.includes('Timeout')) {
                    showError("সার্ভার রেসপন্স করছে না। ইন্টারনেট কানেকশন চেক করুন।");
                } else if(error.message === "GOOGLE_SCRIPT_AUTH_ERROR") {
                    showError("JSON সার্ভারে লগিন সমস্যা আছে।");
                } else if(error.message.includes('Invalid JSON')) {
                    showError("সঠিক ডেটা পাওয়া যায়নি বা পরীক্ষাটি আর সার্ভারে নেই।");
                } else {
                    showError("ডেটা লোড করা যাচ্ছে না। কিছুক্ষণ পর চেষ্টা করুন।");
                }
            }
        }

        form.addEventListener('submit', handleSearch);
        initApp();
    </script>
